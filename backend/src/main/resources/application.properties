#spring.profiles.active=dev
# 服务端口
server.port=8080
spring.application.name=team-rag-knowledge

# 阿里百炼 通用文本向量模型 text-embedding-v3
langchain4j.community.dashscope.embedding-model.api-key=${DASH_SCOPE_API_KEY}
langchain4j.community.dashscope.embedding-model.model-name=text-embedding-v3
# 阿里百炼 通义千问大模型（流式输出）
langchain4j.community.dashscope.streaming-chat-model.api-key=${DASH_SCOPE_API_KEY}

langchain4j.community.dashscope.streaming-chat-model.model-name=qwen-plus
langchain4j.community.dashscope.streaming-chat-model.temperature=0.1

# 日志配置
logging.level.root=info
logging.level.com.team.rag=debug

# Pinecone配置（从环境变量读取，避免硬编码）
pinecone.api-key=${PINECONE_API_KEY}
pinecone.index=${PINECONE_INDEX}
pinecone.region=${PINECONE_REGION}

pinecone.namespace=team-rag-namespace

# 语义分块配置
rag.semantic-splitter.similarity-threshold=0.8
rag.semantic-splitter.max-tokens=1024
rag.semantic-splitter.overlap-tokens=50

# 混合检索配置
rag.hybrid-retrieval.bm25-top-k=3
rag.hybrid-retrieval.vector-top-k=3
rag.hybrid-retrieval.final-top-k=3
rag.vector-retrieval.min-score=0.8

# Redis配置（短期记忆）
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=5000ms
# 取消本地无密码配置：
spring.data.redis.password=${REDIS_PASSWORD}
# 文件上传大小限制
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 邮件发送配置（从环境变量读取）
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.protocol=${MAIL_PROTOCOL:smtp}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# 需求工单接收邮箱
mail.ticket.to=${MAIL_TICKET_TO}
